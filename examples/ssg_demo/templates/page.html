<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <title>{{title}}</title>
    <style>
        body { font-family: system-ui, sans-serif; max-width: 720px; margin: 2rem auto; padding: 0 1rem; line-height: 1.6; color: #333; }
        nav { border-bottom: 1px solid #ddd; padding-bottom: 0.5rem; margin-bottom: 2rem; }
        nav a { margin-right: 1rem; text-decoration: none; color: #0066cc; }
        h1 { color: #111; }
        h2 { color: #444; margin-top: 2rem; }
        ul { padding-left: 1.5rem; }
        code { background: #f4f4f4; padding: 0.1em 0.3em; border-radius: 3px; }
        strong { color: #111; }
        .meta { color: #888; font-size: 0.9rem; margin-bottom: 1.5rem; }
    </style>
</head>
<body>
    <nav>{{nav}}</nav>
    <div class="meta">{{date}}</div>
    {{body}}
</body>
</html>
