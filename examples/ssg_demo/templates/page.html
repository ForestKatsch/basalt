<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{{title}} — Basalt</title>
    <meta name="description" content="{{description}}">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --text: #111;
            --text-2: #555;
            --text-3: #999;
            --accent: #c45200;
            --accent-light: #fef6f0;
            --code-bg: #faf6f1;
            --code-text: #7c4a10;
            --pre-bg: #191714;
            --pre-text: #e8e0d4;
            --rule: #e5e5e5;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, system-ui, sans-serif;
            font-size: 17px;
            line-height: 1.8;
            color: var(--text);
            background: #fff;
            -webkit-font-smoothing: antialiased;
        }

        .page { max-width: 44rem; margin: 0 auto; padding: 0 2rem; }

        .site-header {
            padding: 2rem 0 2.5rem;
        }
        .site-header .page {
            display: flex;
            align-items: baseline;
            gap: 1.5rem;
        }
        .site-header a {
            font-size: 0.8rem;
            font-weight: 500;
            color: var(--text-3);
            text-decoration: none;
        }
        .site-header a:hover { color: var(--accent); }
        .site-header .brand {
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.1em;
        }

        article { padding: 0 0 3rem; }

        article h1 {
            font-size: 2.2rem;
            font-weight: 700;
            letter-spacing: -0.03em;
            line-height: 1.15;
            margin-bottom: 0.4rem;
        }
        article .subtitle {
            color: var(--text-2);
            font-size: 1rem;
            margin-bottom: 3rem;
        }

        article h2 {
            font-size: 1.3rem;
            font-weight: 700;
            letter-spacing: -0.02em;
            margin-top: 3.5rem;
            margin-bottom: 0.75rem;
        }
        article h3 {
            font-size: 1.05rem;
            font-weight: 600;
            margin-top: 2.5rem;
            margin-bottom: 0.5rem;
        }

        article p { margin: 0.8rem 0; }
        article ul, article ol { margin: 0.8rem 0; padding-left: 1.5rem; }
        article li { margin: 0.25rem 0; }

        /* Code: no borders, no shadows. The contrast is the design. */
        article code {
            font-family: 'JetBrains Mono', 'SF Mono', Menlo, monospace;
            font-size: 0.84em;
            background: var(--code-bg);
            color: var(--code-text);
            padding: 0.15em 0.4em;
        }
        article pre {
            background: var(--pre-bg);
            color: var(--pre-text);
            padding: 1.5rem 1.75rem;
            overflow-x: auto;
            margin: 1.5rem 0;
            line-height: 1.55;
        }
        article pre code {
            background: none;
            color: inherit;
            padding: 0;
            font-size: 0.82em;
        }

        .kw { color: #e8a840; }
        .ty { color: #8cb86a; }
        .st { color: #8cb86a; }
        .nu { color: #d0a0c0; }
        .cm { color: #706858; font-style: italic; }
        .fn { color: #6ab8d0; }
        .op { color: #b8a080; }

        article a { color: var(--accent); text-decoration: none; }
        article a:hover { text-decoration: underline; }

        /* Blockquotes: indented, no border. */
        article blockquote {
            margin: 1.2rem 0 1.2rem 1.5rem;
            padding: 0;
            color: var(--text-2);
            font-style: italic;
        }
        article blockquote p { margin: 0.2rem 0; }

        article strong { font-weight: 600; }
        article em { color: var(--text-2); }
        article hr { border: none; border-top: 1px solid var(--rule); margin: 3rem 0; }

        article table { border-collapse: collapse; width: 100%; margin: 1.2rem 0; font-size: 0.9em; }
        article th { font-weight: 600; text-align: left; padding: 0.5rem 0.75rem; border-bottom: 2px solid var(--rule); }
        article td { padding: 0.45rem 0.75rem; border-bottom: 1px solid var(--rule); }
        article tr:last-child td { border-bottom: none; }

        /* Callouts: tinted background, colored label. No borders. */
        article .callout {
            padding: 1rem 1.25rem;
            margin: 1.5rem 0;
            font-size: 0.92em;
        }
        article .callout-tip { background: #f0f7f1; }
        article .callout-warn { background: var(--accent-light); }
        article .callout-note { background: #f0f4f8; }
        article .callout p { margin: 0.25rem 0; font-style: normal; }
        article .callout strong {
            display: block;
            font-size: 0.78em;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            margin-bottom: 0.4rem;
        }
        article .callout-tip strong { color: #2d7a3e; }
        article .callout-warn strong { color: var(--accent); }
        article .callout-note strong { color: #306080; }

        .page-nav {
            display: flex;
            justify-content: space-between;
            margin-top: 4rem;
            padding-top: 1.5rem;
            border-top: 1px solid var(--rule);
        }
        .page-nav a {
            color: var(--text-2);
            text-decoration: none;
            font-size: 0.88rem;
            font-weight: 500;
        }
        .page-nav a:hover { color: var(--accent); }
        .page-nav .prev::before { content: '\2190\00a0\00a0'; color: var(--text-3); }
        .page-nav .next::after { content: '\00a0\00a0\2192'; color: var(--text-3); }

        .footer {
            padding: 2rem 0;
            color: var(--text-3);
            font-size: 0.78rem;
            text-align: center;
        }

        @media (max-width: 640px) {
            body { font-size: 16px; }
            .page { padding: 0 1.25rem; }
            article h1 { font-size: 1.75rem; }
            article pre { padding: 1.1rem 1.25rem; }
        }
    </style>
</head>
<body>
    <div class="site-header"><div class="page">
        <a href="index.html" class="brand">Basalt</a>
        <a href="index.html">Guide</a>
    </div></div>
    <div class="page">
        <article>
            <h1>{{title}}</h1>
            <p class="subtitle">{{description}}</p>
            {{body}}
        </article>
        <nav class="page-nav">
            {{prev}}
            {{next}}
        </nav>
        <footer class="footer">Built with Basalt</footer>
    </div>
</body>
</html>
