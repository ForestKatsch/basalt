<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{{title}} — Basalt</title>
    <meta name="description" content="{{description}}">
    <style>
        @font-face {
            font-family: 'Arcadia';
            src: url('Arcadia-VF.woff2') format('woff2');
            font-weight: 100 900;
            font-display: swap;
        }

        :root {
            --bg: #fafaf8;
            --text: #1a1a18;
            --text-2: #52524e;
            --text-3: #8a8a84;
            --accent: #c05e00;
            --accent-hover: #a04e00;
            --accent-bg: #fef3e8;
            --border: #d0d0c8;
            --border-dot: #c0c0b8;
            --surface: #f2f2ee;
            --code-bg: #f0ede6;
            --code-text: #6b4c1a;
            --pre-bg: #1c1c1a;
            --pre-text: #e8e4da;
            --radius: 2px;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Arcadia', system-ui, sans-serif;
            font-size: 16px;
            line-height: 1.7;
            color: var(--text);
            background: var(--bg);
            font-weight: 400;
        }

        .page { max-width: 50rem; margin: 0 auto; padding: 0 2rem; }

        /* --- Top bar --- */
        .topbar {
            background: var(--pre-bg);
            padding: 0.6rem 0;
            font-size: 0.8rem;
            letter-spacing: 0.04em;
        }
        .topbar .page { display: flex; align-items: center; justify-content: space-between; }
        .topbar .brand {
            font-weight: 700;
            font-size: 0.85rem;
            color: var(--accent);
            text-decoration: none;
            text-transform: uppercase;
            letter-spacing: 0.1em;
        }
        .topbar .brand:hover { color: #fff; }
        .topbar .tagline { color: #706a60; font-size: 0.75rem; letter-spacing: 0.06em; }

        /* --- Navigation --- */
        .nav-bar {
            border-bottom: 1px dotted var(--border-dot);
            padding: 0.6rem 0;
            position: sticky;
            top: 0;
            z-index: 10;
            background: var(--bg);
        }
        .nav-bar .page { display: flex; flex-wrap: wrap; gap: 0; }
        .nav-bar a {
            color: var(--text-2);
            text-decoration: none;
            font-size: 0.78rem;
            font-weight: 500;
            padding: 0.25rem 0.6rem;
            letter-spacing: 0.02em;
            border-radius: var(--radius);
        }
        .nav-bar a:hover { color: var(--accent); background: var(--accent-bg); }

        /* --- Content --- */
        .content { padding: 3rem 0 4rem; }

        .content h1 {
            font-size: 2rem;
            font-weight: 700;
            letter-spacing: -0.02em;
            margin-bottom: 0.25rem;
        }
        .content .subtitle {
            color: var(--text-3);
            font-size: 0.95rem;
            margin-bottom: 2.5rem;
            padding-bottom: 1.5rem;
            border-bottom: 1px dotted var(--border-dot);
        }

        .content h2 {
            font-size: 1.25rem;
            font-weight: 600;
            letter-spacing: -0.01em;
            margin-top: 3rem;
            margin-bottom: 0.6rem;
            padding-top: 1.5rem;
            border-top: 1px dotted var(--border-dot);
        }
        .content h2:first-of-type { border-top: none; padding-top: 0; margin-top: 0; }

        .content h3 {
            font-size: 1rem;
            font-weight: 600;
            color: var(--text-2);
            margin-top: 1.75rem;
            margin-bottom: 0.4rem;
        }

        .content p { margin: 0.7rem 0; }
        .content ul, .content ol { margin: 0.7rem 0; padding-left: 1.4rem; }
        .content li { margin: 0.2rem 0; }
        .content li::marker { color: var(--text-3); }

        /* --- Code --- */
        .content code {
            font-family: 'JetBrains Mono', 'SF Mono', Menlo, monospace;
            font-size: 0.85em;
            background: var(--code-bg);
            color: var(--code-text);
            padding: 0.12em 0.35em;
            border-radius: var(--radius);
        }
        .content pre {
            background: var(--pre-bg);
            color: var(--pre-text);
            padding: 1.25rem 1.5rem;
            border-radius: var(--radius);
            overflow-x: auto;
            margin: 1rem 0;
            line-height: 1.5;
            border: 1px solid #2a2a28;
        }
        .content pre code {
            background: none;
            color: inherit;
            padding: 0;
            font-size: 0.82em;
            font-weight: 400;
        }

        /* --- Syntax highlighting --- */
        .kw { color: #e0a040; }
        .ty { color: #8cbd6a; }
        .st { color: #8cbd6a; }
        .nu { color: #d4a0c0; }
        .cm { color: #666660; font-style: italic; }
        .fn { color: #6abcd4; }
        .op { color: #b8a080; }

        /* --- Links --- */
        .content a { color: var(--accent); text-decoration: none; border-bottom: 1px dotted var(--border-dot); }
        .content a:hover { color: var(--accent-hover); border-bottom-color: var(--accent); }

        /* --- Blockquotes --- */
        .content blockquote {
            border-left: 3px solid var(--accent);
            padding: 0.6rem 1rem;
            margin: 1rem 0;
            background: var(--accent-bg);
            border-radius: var(--radius);
            color: var(--text-2);
        }
        .content blockquote p { margin: 0.2rem 0; }

        .content strong { font-weight: 600; }
        .content em { color: var(--text-2); }
        .content hr { border: none; border-top: 1px dotted var(--border-dot); margin: 2.5rem 0; }

        /* --- Tables --- */
        .content table { border-collapse: collapse; width: 100%; margin: 1rem 0; font-size: 0.88em; }
        .content th {
            background: var(--surface);
            font-weight: 600;
            text-align: left;
            padding: 0.5rem 0.75rem;
            border-bottom: 1px solid var(--border);
        }
        .content td { padding: 0.45rem 0.75rem; border-bottom: 1px dotted var(--border-dot); }
        .content tr:last-child td { border-bottom: none; }

        /* --- Callouts --- */
        .content .callout {
            padding: 0.9rem 1.1rem;
            border-radius: var(--radius);
            margin: 1.25rem 0;
            font-size: 0.92em;
            border-left: 3px solid;
        }
        .content .callout-tip { background: #f0f7ee; border-color: #4a8c3f; }
        .content .callout-warn { background: var(--accent-bg); border-color: var(--accent); }
        .content .callout-note { background: #eef3fa; border-color: #4a72a0; }
        .content .callout p { margin: 0.25rem 0; }
        .content .callout strong { display: block; margin-bottom: 0.2rem; font-size: 0.9em; text-transform: uppercase; letter-spacing: 0.05em; }

        /* --- Prev/Next --- */
        .page-nav {
            display: flex;
            justify-content: space-between;
            padding: 1.5rem 0;
            margin-top: 2rem;
            border-top: 1px dotted var(--border-dot);
        }
        .page-nav a {
            color: var(--text-2);
            text-decoration: none;
            font-weight: 500;
            font-size: 0.88rem;
            padding: 0.4rem 0.8rem;
            border: 1px dotted var(--border-dot);
            border-radius: var(--radius);
        }
        .page-nav a:hover { color: var(--accent); border-color: var(--accent); background: var(--accent-bg); }
        .page-nav .prev::before { content: '\2190\00a0'; }
        .page-nav .next::after { content: '\00a0\2192'; }

        /* --- Footer --- */
        .footer {
            padding: 1.5rem 0;
            border-top: 1px dotted var(--border-dot);
            color: var(--text-3);
            font-size: 0.78rem;
            text-align: center;
            letter-spacing: 0.03em;
        }

        @media (max-width: 640px) {
            body { font-size: 15px; }
            .page { padding: 0 1rem; }
            .content h1 { font-size: 1.6rem; }
            .content pre { padding: 0.9rem 1rem; font-size: 0.8em; }
        }
    </style>
</head>
<body>
    <div class="topbar"><div class="page">
        <a href="index.html" class="brand">Basalt</a>
        <span class="tagline">a language that tells the truth</span>
    </div></div>
    <div class="nav-bar"><div class="page">{{nav}}</div></div>
    <div class="page">
        <article class="content">
            <h1>{{title}}</h1>
            <p class="subtitle">{{description}}</p>
            {{body}}
        </article>
        <nav class="page-nav">
            {{prev}}
            {{next}}
        </nav>
        <footer class="footer">Built with a static site generator written in Basalt</footer>
    </div>
</body>
</html>
