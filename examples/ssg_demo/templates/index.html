<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{{title}}</title>
    <meta name="description" content="{{description}}">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; line-height: 1.7; color: #2d3748; max-width: 48rem; margin: 0 auto; padding: 2rem 1.5rem; }
        nav { display: flex; gap: 1.5rem; padding: 1rem 0; border-bottom: 2px solid #e2e8f0; margin-bottom: 2.5rem; }
        nav a { color: #4a5568; text-decoration: none; font-weight: 500; }
        nav a:hover { color: #2b6cb0; }
        h1 { font-size: 2rem; color: #1a202c; margin: 1.5rem 0 1rem; }
        p { margin: 0.75rem 0; }
        a { color: #2b6cb0; }
        .page-list { list-style: none; padding: 0; }
        .page-list li { padding: 1.25rem 0; border-bottom: 1px solid #e2e8f0; }
        .page-list li:last-child { border-bottom: none; }
        .page-list a { font-size: 1.2rem; font-weight: 600; text-decoration: none; }
        .page-list a:hover { text-decoration: underline; }
        .page-list .date { color: #718096; font-size: 0.85rem; margin-top: 0.25rem; }
        .page-list .desc { color: #4a5568; font-size: 0.95rem; margin-top: 0.25rem; }
        footer { margin-top: 3rem; padding-top: 1.5rem; border-top: 2px solid #e2e8f0; color: #a0aec0; font-size: 0.85rem; }
    </style>
</head>
<body>
    <nav>{{nav}}</nav>
    {{body}}
    <footer>Built with Basalt</footer>
</body>
</html>
