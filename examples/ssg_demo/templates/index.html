<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{{title}} — Basalt</title>
    <meta name="description" content="{{description}}">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --text: #111;
            --text-2: #555;
            --text-3: #999;
            --accent: #c45200;
            --accent-light: #fef6f0;
            --code-bg: #faf6f1;
            --code-text: #7c4a10;
            --pre-bg: #191714;
            --pre-text: #e8e0d4;
            --rule: #e5e5e5;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, system-ui, sans-serif;
            font-size: 17px;
            line-height: 1.8;
            color: var(--text);
            background: #fff;
            -webkit-font-smoothing: antialiased;
        }

        .page { max-width: 44rem; margin: 0 auto; padding: 0 2rem; }

        .site-header { padding: 2rem 0 0; }
        .site-header .brand {
            font-size: 0.8rem; font-weight: 700; color: var(--text-3);
            text-decoration: none; text-transform: uppercase; letter-spacing: 0.1em;
        }
        .site-header .brand:hover { color: var(--accent); }

        /* --- Hero --- */
        .hero { padding: 4rem 0 3rem; }
        .hero h1 {
            font-size: 2.8rem;
            font-weight: 700;
            letter-spacing: -0.04em;
            line-height: 1.1;
            margin-bottom: 1rem;
        }
        .hero .lead {
            font-size: 1.05rem;
            color: var(--text-2);
            max-width: 36rem;
            line-height: 1.7;
            margin-bottom: 2.5rem;
        }
        .hero-code {
            background: var(--pre-bg);
            color: var(--pre-text);
            padding: 1.5rem 1.75rem;
            max-width: 36rem;
            font-family: 'JetBrains Mono', 'SF Mono', Menlo, monospace;
            font-size: 0.82em;
            line-height: 1.6;
        }

        /* --- Content --- */
        .content { padding: 0 0 2rem; }
        .content h2 {
            font-size: 1.3rem; font-weight: 700; letter-spacing: -0.02em;
            margin-top: 3.5rem; margin-bottom: 0.75rem;
        }
        .content h3 { font-size: 1.05rem; font-weight: 600; margin-top: 2.5rem; margin-bottom: 0.5rem; }
        .content p { margin: 0.8rem 0; }
        .content a { color: var(--accent); text-decoration: none; }
        .content a:hover { text-decoration: underline; }
        .content ul, .content ol { margin: 0.8rem 0; padding-left: 1.5rem; }
        .content li { margin: 0.25rem 0; }
        .content code {
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.84em; background: var(--code-bg); color: var(--code-text);
            padding: 0.15em 0.4em;
        }
        .content pre {
            background: var(--pre-bg); color: var(--pre-text);
            padding: 1.5rem 1.75rem; overflow-x: auto;
            margin: 1.5rem 0; line-height: 1.55;
        }
        .content pre code { background: none; color: inherit; padding: 0; font-size: 0.82em; }
        .content blockquote { margin: 1.2rem 0 1.2rem 1.5rem; padding: 0; color: var(--text-2); font-style: italic; }
        .content strong { font-weight: 600; }

        .content .callout { padding: 1rem 1.25rem; margin: 1.5rem 0; font-size: 0.92em; }
        .content .callout-tip { background: #f0f7f1; }
        .content .callout-warn { background: var(--accent-light); }
        .content .callout-note { background: #f0f4f8; }
        .content .callout p { margin: 0.25rem 0; }
        .content .callout strong { display: block; font-size: 0.78em; font-weight: 700; text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 0.4rem; }
        .content .callout-tip strong { color: #2d7a3e; }
        .content .callout-warn strong { color: var(--accent); }
        .content .callout-note strong { color: #306080; }

        .kw { color: #e8a840; }
        .ty { color: #8cb86a; }
        .st { color: #8cb86a; }
        .nu { color: #d0a0c0; }
        .cm { color: #706858; font-style: italic; }
        .fn { color: #6ab8d0; }
        .op { color: #b8a080; }

        .content table { border-collapse: collapse; width: 100%; margin: 1.2rem 0; font-size: 0.9em; }
        .content th { font-weight: 600; text-align: left; padding: 0.5rem 0.75rem; border-bottom: 2px solid var(--rule); }
        .content td { padding: 0.45rem 0.75rem; border-bottom: 1px solid var(--rule); }
        .content tr:last-child td { border-bottom: none; }

        /* --- Chapters --- */
        .chapters { list-style: none; padding: 0; }
        .chapters li + li { border-top: 1px solid var(--rule); }
        .chapters a.chapter-link {
            display: flex; align-items: baseline; gap: 1rem;
            text-decoration: none; color: inherit; padding: 1rem 0;
        }
        .chapters a.chapter-link:hover .chapter-title { color: var(--accent); }
        .chapters .num {
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.75rem; font-weight: 500; color: var(--text-3); min-width: 1.5rem;
        }
        .chapters .chapter-info { flex: 1; }
        .chapters .chapter-title { font-size: 0.95rem; font-weight: 600; }
        .chapters .desc { color: var(--text-3); font-size: 0.85rem; margin-top: 0.1rem; }
        .chapters .date { display: none; }

        .footer { padding: 2rem 0; color: var(--text-3); font-size: 0.78rem; text-align: center; }

        @media (max-width: 640px) {
            body { font-size: 16px; }
            .page { padding: 0 1.25rem; }
            .hero h1 { font-size: 2rem; }
            .hero-code { font-size: 0.78em; padding: 1.1rem 1.25rem; }
        }
    </style>
</head>
<body>
    <div class="page">
        <div class="site-header">
            <a href="index.html" class="brand">Basalt</a>
        </div>
        <div class="hero">
            <h1>Learn Basalt</h1>
            <p class="lead">A statically typed language where absence is always visible in the type, errors are always visible in the return type, and nothing happens that the code doesn't say.</p>
            <div class="hero-code">
<span style="color:#e8a840">fn</span> <span style="color:#6ab8d0">main</span>(stdout: <span style="color:#8cb86a">Stdout</span>) {<br>
&nbsp;&nbsp;&nbsp;&nbsp;stdout.<span style="color:#6ab8d0">println</span>(<span style="color:#8cb86a">"Hello! You're running Basalt."</span>)<br>
}
            </div>
        </div>
        <article class="content">
            {{body}}
        </article>
        <footer class="footer">Built with Basalt</footer>
    </div>
</body>
</html>
